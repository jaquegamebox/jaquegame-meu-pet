<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Pet: Origens Elementais</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ar: #e0f7fa; --agua: #0288d1; --fogo: #f44336; --terra: #8bc34a; --metal: #b0bec5;
        }
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: 'Poppins', sans-serif; 
            background-color: #1a1a1a; /* Fundo escuro caso a imagem suma */
        }

        /* Palco Principal */
        #main-stage {
            width: 100vw; height: 100vh;
            background: url('./cenario.jpg') no-repeat center center;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* Zonas de Clique (Sobre as prateleiras) */
        .click-zone {
            position: absolute; cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1); 
            border-radius: 15px;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.2rem; font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.2);
            width: 120px; height: 160px;
        }
        .click-zone:hover { 
            border: 2px solid white; 
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        /* Ajuste de Posição das Prateleiras (Baseado na nossa imagem 3D) */
        #zone-ar    { top: 35%; left: 8%; }
        #zone-agua  { top: 35%; left: 26%; }
        #zone-metal { top: 32%; left: 44%; }
        #zone-fogo  { top: 35%; left: 63%; }
        #zone-terra { top: 35%; left: 81%; }

        /* Cenário de Incubação */
        #incubation-stage {
            display: none; width: 100vw; height: 100vh;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .bg-ar { background: radial-gradient(circle, #81d4fa, #01579b); }
        .bg-agua { background: radial-gradient(circle, #4fc3f7, #01579b); }
        .bg-fogo { background: radial-gradient(circle, #ff7043, #bf360c); }
        .bg-terra { background: radial-gradient(circle, #9ccc65, #33691e); }
        .bg-metal { background: radial-gradient(circle, #cfd8dc, #37474f); }

        #egg-display {
            width: 180px; height: 240px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            cursor: pointer; transition: 0.1s;
            border: 4px solid rgba(255,255,255,0.3);
        }

        .shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(0,0) rotate(0); }
            20% { transform: translate(-5px,0) rotate(-2deg); }
            60% { transform: translate(5px,0) rotate(2deg); }
            100% { transform: translate(0,0) rotate(0); }
        }

        #pet-reveal {
            display: none; font-size: 120px; 
            filter: drop-shadow(0 0 20px white);
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

    </style>
</head>
<body>

    <div id="main-stage">
        <div id="zone-ar" class="click-zone" onclick="startIncubation('ar')">AR</div>
        <div id="zone-agua" class="click-zone" onclick="startIncubation('agua')">ÁGUA</div>
        <div id="zone-metal" class="click-zone" onclick="startIncubation('metal')">METAL</div>
        <div id="zone-fogo" class="click-zone" onclick="startIncubation('fogo')">FOGO</div>
        <div id="zone-terra" class="click-zone" onclick="startIncubation('terra')">TERRA</div>
    </div>

    <div id="incubation-stage">
        <h1 id="status-text" style="color: white; text-shadow: 2px 2px 10px black; margin-bottom: 30px;">Clique rápido para chocar!</h1>
        <div id="egg-display"></div>
        <div id="pet-reveal">🦉</div>
        <button onclick="location.reload()" style="margin-top:40px; padding:12px 25px; cursor:pointer; border-radius: 20px; border:none; font-family: 'Poppins'; font-weight: bold;">Voltar ao Berçário</button>
    </div>

    <script>
        let clicks = 12;
        let selectedElement = "";

        function startIncubation(element) {
            selectedElement = element;
            document.getElementById('main-stage').style.display = 'none';
            const stage = document.getElementById('incubation-stage');
            stage.style.display = 'flex';
            stage.className = 'bg-' + element;
            
            const egg = document.getElementById('egg-display');
            const reveal = document.getElementById('pet-reveal');
            
            // Cores dos Ovos e Emojis Provisórios
            if(element === 'ar') { egg.style.background = 'white'; reveal.innerText = '🦉'; }
            if(element === 'agua') { egg.style.background = '#90caf9'; reveal.innerText = '🐬'; }
            if(element === 'fogo') { egg.style.background = '#ffab91'; reveal.innerText = '🐲'; }
            if(element === 'terra') { egg.style.background = '#a5d6a7'; reveal.innerText = '🐢'; }
            if(element === 'metal') { egg.style.background = '#eceff1'; reveal.innerText = '🤖'; }
        }

        document.getElementById('egg-display').addEventListener('click', function() {
            if (clicks > 0) {
                clicks--;
                this.style.transform = 'scale(0.9)';
                setTimeout(() => this.style.transform = 'scale(1)', 50);
                
                if (clicks <= 5) this.classList.add('shake');

                if (clicks === 0) {
                    this.style.display = 'none';
                    document.getElementById('status-text').innerText = "Ele nasceu! ✨";
                    const reveal = document.getElementById('pet-reveal');
                    reveal.style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
